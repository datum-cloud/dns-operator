recursor:
  setuid: pdns
  setgid: pdns
  daemon: false
  # Recursor needs a writable socket directory; container rootfs is read-only.
  socket_dir: /run/pdns/recursor
  # Forward all queries to Cloudflare's and Google's public resolvers.
  forward_zones_recurse:
    - zone: "."
      forwarders:
        - "1.1.1.1"
        - "8.8.8.8"

incoming:
  # Only serve recursion to the local pod; auth will use this for ALIAS expansion.
  listen:
    - "127.0.0.1:5300"
    - "[::1]:5300"
  allow_from:
    - "127.0.0.1/32"
    - "::1/128"

webservice:
  # Expose Prometheus metrics at /metrics on this address/port.
  # (This is separate from the DNS listener above.)
  webserver: true
  address: 0.0.0.0
  port: 8083
  allow_from:
    - "0.0.0.0/0"
    - "::/0"

logging:
  # 0..7 (emerg..debug). 4=warning
  loglevel: 4
