data_dir: /var/lib/vector

api:
  enabled: false

enrichment_tables:
  zone_project:
    type: file
    file:
      path: /etc/vector/enrichment/zone_project.csv
      encoding:
        type: csv
        delimiter: ","
    schema:
      zone: string
      project: string

sources:
  edge_metrics:
    type: http_server
    address: 0.0.0.0:9000
    decoding:
      codec: native_json
    framing:
      method: newline_delimited
    auth:
      strategy: basic
      username: ${VECTOR_HTTP_AUTH_USERNAME}
      password: ${VECTOR_HTTP_AUTH_PASSWORD}

transforms:
  add_project_tags:
    type: remap
    inputs:
      - edge_metrics
    source: |
      # Add tags if missing
      if !exists(.tags) { .tags = {} }
      
      # Get zone from metric tags
      zone = to_string(.tags.zone) ?? null

      if zone != null {
      
        # Lookup project from enrichment table
        record, err = get_enrichment_table_record("zone_project", {"zone": zone})
      
        # Add project tag if found
        if err == null && record != null && exists(record.project) {
          .tags.project = to_string(record.project) ?? record.project
        }
      }

sinks:
  console:
    type: console
    target: stdout
    encoding:
      codec: json
    inputs:
      - add_project_tags

  victoria_metrics:
    type: prometheus_remote_write
    inputs:
      - add_project_tags
    endpoint: ${VICTORIA_METRICS_REMOTE_WRITE_URL}
    healthcheck:
      enabled: false
    buffer:
      type: disk
      max_size: 268435488
      when_full: block
