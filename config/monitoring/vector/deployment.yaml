apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector
  labels:
    app.kubernetes.io/name: vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vector
    spec:
      serviceAccountName: vector
      initContainers:
        - name: init-enrichment-table
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /enrichment/configmaps
              # create a valid CSV with headers so Vector can compile VRL at startup
              printf 'zone,project\n' > /enrichment/zone_project.csv
          volumeMounts:
            - name: vector-enrichment
              mountPath: /enrichment
      containers:
        - name: vector
          image: timberio/vector:0.51.1-distroless-static
          imagePullPolicy: IfNotPresent
          args:
            - --log-format=json
            - --verbose
            - --watch-config
            - --config-dir
            - /etc/vector/
          env:
            - name: VICTORIA_METRICS_REMOTE_WRITE_URL
              value: http://prometheus.dns-monitoring.svc:9090/api/v1/write
            - name: VECTOR_METRICS_GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vector-metrics-gateway-password
                  key: password
          ports:
            - containerPort: 9000
              name: vector
              protocol: TCP
          volumeMounts:
            - name: vector-config
              mountPath: /etc/vector/vector-config.yaml
              subPath: vector-config.yaml
            - name: vector-config-volume
              mountPath: /etc/vector
            - name: vector-enrichment
              mountPath: /etc/vector/enrichment
              readOnly: true
            - name: vector-data
              mountPath: /var/lib/vector
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        - name: zone-accounting-sidecar
          image: kiwigrid/k8s-sidecar:1.30.9
          imagePullPolicy: IfNotPresent
          env:
            - name: RESOURCE
              value: configmap
            - name: NAMESPACE
              value: datum-downstream-dnszone-accounting
            - name: LABEL
              value: datum.net/dnszone-accounting
            - name: LABEL_VALUE
              value: enabled
            - name: FOLDER
              value: /tmp/
            - name: UNIQUE_FILENAMES
              value: "true"
            - name: METHOD
              value: WATCH
            - name: SCRIPT
              value: /scripts/build-zone-project.sh
          volumeMounts:
            - name: vector-enrichment
              mountPath: /enrichment
            - name: vector-enrichment-scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: vector-config
          configMap:
            name: vector-config
        - name: vector-config-volume
          emptyDir: {}
        - name: vector-enrichment
          emptyDir: {}
        - name: vector-enrichment-scripts
          configMap:
            name: vector-enrichment-scripts
            defaultMode: 0555
        - name: vector-data
          emptyDir: {}
