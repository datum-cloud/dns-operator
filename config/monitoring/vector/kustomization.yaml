apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - rbac.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: vector-config
    files:
      - config/vector-config.yaml
  - name: vector-enrichment-scripts
    files:
      - scripts/build-zone-project.sh

secretGenerator:
  - name: vector-http-auth
    literals:
      - username=admin
      - password=admin