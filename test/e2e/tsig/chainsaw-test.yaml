# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: dns-operator-tsig
spec:
  clusters:
    upstream:
      kubeconfig: ../kubeconfig-upstream
    downstream:
      kubeconfig: ../kubeconfig-downstream
  cluster: upstream
  steps:
  - name: Prereq - create DNSZoneClass in upstream
    try:
    - create:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZoneClass
          metadata:
            name: powerdns-static-tsig
          spec:
            controllerName: powerdns
            nameServerPolicy:
              mode: Static
              static:
                servers:
                - ns1.example.com
                - ns2.example.com
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZoneClass
          metadata:
            name: powerdns-static-tsig

  - name: Prereq - create DNSZoneClass in downstream
    try:
    - create:
        cluster: downstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZoneClass
          metadata:
            name: powerdns-static-tsig
          spec:
            controllerName: powerdns
            nameServerPolicy:
              mode: Static
              static:
                servers:
                - ns1.example.com
                - ns2.example.com
    - assert:
        cluster: downstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZoneClass
          metadata:
            name: powerdns-static-tsig

  - name: Create DNSZone upstream
    try:
    - create:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZone
          metadata:
            name: example-com-tsig
          spec:
            domainName: example-tsig.com
            dnsZoneClassName: powerdns-static-tsig
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZone
          metadata:
            name: example-com-tsig

  - name: Wait for DNSZone Accepted/Programmed upstream
    try:
    - sleep:
        duration: 5s
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZone
          metadata:
            name: example-com-tsig
          status:
            conditions:
            - type: Accepted
              status: "True"
            - type: Programmed
              status: "True"

  - name: Confirm DNSZone exists downstream in mapped namespace
    try:
    - script:
        cluster: upstream
        skipCommandOutput: true
        skipLogOutput: true
        content: |
          kubectl get ns $NAMESPACE -o json
        outputs:
        - name: downstreamNamespaceName
          value: (join('-', ['ns', json_parse($stdout).metadata.uid]))
    - assert:
        cluster: downstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZone
          metadata:
            name: example-com-tsig
            namespace: ($downstreamNamespaceName)

  - name: Create generated TSIGKey upstream (no secretRef)
    try:
    - create:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-gen
          spec:
            dnsZoneRef:
              name: example-com-tsig
            keyName: datum-example-com-tsig-gen
            algorithm: hmac-sha256
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-gen
            ownerReferences:
            - apiVersion: dns.networking.miloapis.com/v1alpha1
              kind: DNSZone
              name: example-com-tsig

  - name: Wait for generated TSIGKey Accepted/Programmed upstream
    try:
    - sleep:
        duration: 5s
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-gen
          status:
            conditions:
            - type: Accepted
              status: "True"
            - type: Programmed
              status: "True"

  - name: Assert generated Secret exists upstream
    try:
    - assert:
        cluster: upstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: example-com-tsig-gen

  - name: Confirm generated TSIGKey + Secret exist downstream
    try:
    - script:
        cluster: upstream
        skipCommandOutput: true
        skipLogOutput: true
        content: |
          kubectl get ns $NAMESPACE -o json
        outputs:
        - name: downstreamNamespaceName
          value: (join('-', ['ns', json_parse($stdout).metadata.uid]))
    - assert:
        cluster: downstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)
    - assert:
        cluster: downstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)

  - name: Delete downstream generated Secret and ensure it is recreated
    try:
    - script:
        cluster: upstream
        skipCommandOutput: true
        skipLogOutput: true
        content: |
          kubectl get ns $NAMESPACE -o json
        outputs:
        - name: downstreamNamespaceName
          value: (join('-', ['ns', json_parse($stdout).metadata.uid]))
    - delete:
        cluster: downstream
        ref:
          apiVersion: v1
          kind: Secret
          namespace: ($downstreamNamespaceName)
          name: example-com-tsig-gen
    - sleep:
        duration: 5s
    - assert:
        cluster: downstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)

  - name: Delete downstream generated TSIGKey and ensure it + Secret are recreated
    try:
    - script:
        cluster: upstream
        skipCommandOutput: true
        skipLogOutput: true
        content: |
          kubectl get ns $NAMESPACE -o json
        outputs:
        - name: downstreamNamespaceName
          value: (join('-', ['ns', json_parse($stdout).metadata.uid]))
    - script:
        cluster: downstream
        content: |
          set -euo pipefail
          # Find the mapped downstream namespace by label selector, then delete.
          ns=$(kubectl get tsigkey -A \
            -l meta.datumapis.com/upstream-namespace="$NAMESPACE",meta.datumapis.com/upstream-name=example-com-tsig-gen \
            -o jsonpath='{.items[0].metadata.namespace}')
          kubectl -n "$ns" delete tsigkey example-com-tsig-gen --wait=false --ignore-not-found=true
    - sleep:
        duration: 8s
    - assert:
        cluster: downstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)
    - assert:
        cluster: downstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)

  - name: Delete upstream generated TSIGKey and ensure downstream TSIGKey + Secret are GC'd
    try:
    - script:
        cluster: upstream
        skipCommandOutput: true
        skipLogOutput: true
        content: |
          kubectl get ns $NAMESPACE -o json
        outputs:
        - name: downstreamNamespaceName
          value: (join('-', ['ns', json_parse($stdout).metadata.uid]))
    - delete:
        cluster: upstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          name: example-com-tsig-gen
    - sleep:
        duration: 10s
    - error:
        cluster: downstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)
    - error:
        cluster: downstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: example-com-tsig-gen
            namespace: ($downstreamNamespaceName)

  - name: Create BYO Secret + TSIGKey upstream
    try:
    - create:
        cluster: upstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: byo-tsig
          type: Opaque
          stringData:
            secret: supersecret
    - create:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-byo
          spec:
            dnsZoneRef:
              name: example-com-tsig
            keyName: datum-example-com-tsig-byo
            algorithm: hmac-sha256
            secretRef:
              name: byo-tsig

  - name: Wait for BYO TSIGKey Accepted/Programmed upstream
    try:
    - sleep:
        duration: 5s
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-byo
          status:
            conditions:
            - type: Accepted
              status: "True"
            - type: Programmed
              status: "True"

  - name: Assert BYO Secret exists upstream
    try:
    - assert:
        cluster: upstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: byo-tsig

  - name: Confirm BYO Secret exists downstream and recreates when deleted
    try:
    - script:
        cluster: upstream
        skipCommandOutput: true
        skipLogOutput: true
        content: |
          kubectl get ns $NAMESPACE -o json
        outputs:
        - name: downstreamNamespaceName
          value: (join('-', ['ns', json_parse($stdout).metadata.uid]))
    - assert:
        cluster: downstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: byo-tsig
            namespace: ($downstreamNamespaceName)
    - delete:
        cluster: downstream
        ref:
          apiVersion: v1
          kind: Secret
          namespace: ($downstreamNamespaceName)
          name: byo-tsig
    - sleep:
        duration: 5s
    - assert:
        cluster: downstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: byo-tsig
            namespace: ($downstreamNamespaceName)

  - name: Edge case - bad secret surfaced via Accepted=False (missing secret key)
    try:
    - create:
        cluster: upstream
        resource:
          apiVersion: v1
          kind: Secret
          metadata:
            name: bad-tsig
          type: Opaque
          stringData:
            notsecret: foo
    - create:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-bad
          spec:
            dnsZoneRef:
              name: example-com-tsig
            keyName: datum-example-com-tsig-bad
            algorithm: hmac-sha256
            secretRef:
              name: bad-tsig
    - sleep:
        duration: 5s
    - assert:
        cluster: upstream
        resource:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          metadata:
            name: example-com-tsig-bad
          status:
            conditions:
            - type: Accepted
              status: "False"
              reason: InvalidSecret

  - name: Teardown — delete keys, zone, classes
    try:
    - delete:
        cluster: upstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          name: example-com-tsig-gen
    - delete:
        cluster: upstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          name: example-com-tsig-byo
    - delete:
        cluster: upstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: TSIGKey
          name: example-com-tsig-bad
    - delete:
        cluster: upstream
        ref:
          apiVersion: v1
          kind: Secret
          name: byo-tsig
    - delete:
        cluster: upstream
        ref:
          apiVersion: v1
          kind: Secret
          name: bad-tsig
    - delete:
        cluster: upstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZone
          name: example-com-tsig
    - delete:
        cluster: downstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZoneClass
          name: powerdns-static-tsig
    - delete:
        cluster: upstream
        ref:
          apiVersion: dns.networking.miloapis.com/v1alpha1
          kind: DNSZoneClass
          name: powerdns-static-tsig

